data:
  train_path: "hull-tactical-market-prediction/train.csv"
  test_path: "hull-tactical-market-prediction/test.csv"

target:
  name: "market_forward_excess_returns"
  date_col: "date_id"
  info_cols:
    - "date_id"
    - "forward_returns"
    - "risk_free_rate"

split:
  internal_test_days: 126

features:
  use_expanding_zscore: false
  expanding_min_periods: 30
  lags_by_group:
    D: [1, 5, 21]
    E: [1, 5, 21]
    I: [1, 5, 21]
    M: [1, 2, 5, 10, 21]
    P: [1, 5, 21]
    S: [1, 2, 5]
    V: [1, 2, 5, 10, 21]
  rolling_by_group:
    D: [21, 63]
    E: [21, 63]
    I: [21, 63]
    M: [5, 21]
    P: [21, 63]
    S: [5, 21]
    V: [5, 21, 63]
  ic_filter:
    enabled: true
    min_samples: 200
    ic_threshold: 0.01
    p_threshold: 0.05
    corr_threshold: 0.9
  regime:
    enabled: true
    state_features:
      - "V10_roll_std_21"
      - "V10_roll_std_63"
      - "V13_z"
      - "V10_z"
      - "V13_roll_mean_63"
      - "E11_z"
      - "E19_z"
    n_components: 3
    n_splits: 5
    min_fit_rows: 200
    fill_prob: true

model:
  lgbm_params:
    objective: "regression"
    metric: "l2"
    learning_rate: 0.008554052787970981
    n_estimators: 20000
    num_leaves: 222
    min_child_samples: 134
    subsample: 0.8835617480896776
    subsample_freq: 8
    colsample_bytree: 0.9528623088730783
    reg_alpha: 0.05945996810888403
    reg_lambda: 8.502680653559366
    max_depth: 9
    random_state: 42
    n_jobs: -1
    device_type: "gpu"
  n_splits: 5
  early_stopping_rounds: 300
  verbose_eval: 200
  walk_forward:
    enabled: true
    val_window: 63
    step: 21
    embargo: 20
  tuning:
    enabled: false
    n_trials: 30
    timeout_seconds: 0
    direction: "maximize"

patchtst:
  enabled: false
  use_exog: false
  tuning:
    n_trials: 20
    max_folds: 5
    timeout_seconds: 0
  training:
    input_size: 256
    max_steps: 1000
    max_steps_predict: 200
    batch_size: 32
    val_window: 63
    step: 21
    embargo: 20
  search_space:
    learning_rate: [0.0005, 0.01]
    hidden_size: [64, 256]
    n_heads: [2, 8]
    dropout: [0.0, 0.2]

tft:
  enabled: false
  use_exog: true
  tuning:
    n_trials: 20
    max_folds: 5
    timeout_seconds: 0
  training:
    input_size: 64
    max_steps: 1000
    max_steps_predict: 200
    batch_size: 8
    val_window: 63
    step: 21
    embargo: 20
  search_space:
    learning_rate: [0.0005, 0.01]
    hidden_size: [32, 96]
    n_heads: [2, 8]
    dropout: [0.0, 0.2]

nbeats:
  enabled: false
  use_exog: false
  tuning:
    n_trials: 20
    max_folds: 5
    timeout_seconds: 0
  training:
    input_size: 64
    max_steps: 400
    max_steps_predict: 200
    batch_size: 16
    val_window: 63
    step: 21
    embargo: 20
  search_space:
    learning_rate: [0.0005, 0.01]
    input_size: [32, 96]
    batch_size: [4, 16]
    max_steps: [200, 500]
    mlp_units: [64, 256]
    mlp_layers: [1, 3]
    n_blocks: [1, 3]
    stack_types:
      - "identity-trend-seasonality"
      - "identity-trend"
      - "identity-seasonality"
    n_polynomials: [1, 4]
    n_harmonics: [1, 4]

outputs:
  artifacts_dir: "artifacts"
  model_name: "lgbm_regression.joblib"

evaluation:
  sharpe:
    annualization: 252.0
    nw_lag: 5
